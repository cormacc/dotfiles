{
//See https://wiki.hyprland.org/Useful-Utilities/Status-Bars/
//and https://github.com/Alexays/Waybar/wiki/Module:-Hyprland
//LAYOUT
    "position": "bottom",
    "layer": "top",
    "modules-left": ["hyprland/workspaces", "hyprland/submap"],
    "modules-center": ["hyprland/window"],
    "modules-right": [
        // Info
        "hyprland/language",
        "cpu",
        "temperature",
        "memory",
        "battery",

        // Levels
        "backlight",
        "wireplumber",

        // Connections
        // Using nm-applet instead
        // "network",
        "bluetooth",

        //System
        "tray",
        "clock"
    ],


// MODULE CONFIGURATION
    "hyprland/window": {
        "separate-outputs": true
    },

    "hyprland/language": {
        "format": "ΎΕε   {}"
        // "min-length": 5,
        // "tooltip": false,
        // "on-click": "swaymsg input type:keyboard xkb_switch_layout next"
    },

    "cpu": {
        "interval": 10,
        "format": "≤░αγ",
        "states": {
            "warning": 70,
            "critical": 90
        },
        "on-click": "swaymsg exec \\$once \\$term_float htop",
        "tooltip": true
    },

    "temperature": {
        "critical-threshold": 90,
        "interval": 5,
        "format": "{icon}",
        "tooltip-format": "{temperatureC}┬░C",
        "format-icons": ["ΎΜΜ", "ΎΜΚ", "ΎΜΙ"],
        "tooltip": true,
        "on-click": "swaymsg exec \"\\$once \\$term_float watch sensors\""
    },

    "memory": {
        "interval": 10,
        "format": "≤░Ξδ",
        "states": {
            "warning": 70,
            "critical": 90
        },
        "on-click": "swaymsg exec \\$once \\$term_float htop",
        "tooltip": true
    },

    "battery": {
        "format": "{capacity}% {icon}",
        "format-icons": ["ΎΚΕ", "ΎΚΔ", "ΎΚΓ", "ΎΚΒ", "ΎΚΑ"]
    },


    // Using nm-applet instead
    // "network": {
    //     "interval": 5,
    //     "format-wifi": "ΎΘτ ",
    //     "format-ethernet": "≤░ΙΑ",
    //     "format-disconnected": "≤░Ψς",
    //     "tooltip-format": "{icon} {ifname}: {ipaddr}",
    //     "tooltip-format-ethernet": "{icon} {ifname}: {ipaddr}",
    //     "tooltip-format-wifi": "{icon} {ifname} ({essid}): {ipaddr}",
    //     "tooltip-format-disconnected": "{icon} disconnected",
    //     "tooltip-format-disabled": "{icon} disabled",
    //     // TODO: link to nm-applet? Or reinstate tui...
    //     // "on-click": "swaymsg exec \\$once \\$term_float nmtui connect"
    // },

    "bluetooth": {
        "format": "≤░Γψ",
        "format-disabled": "≤░Γ▓",
        // TODO: What's my nixos bluetooth setup?
        // "on-click": "swaymsg exec \\$bluetooth",
        // "on-click-right": "rfkill toggle bluetooth",
        "tooltip-format": "{}"
    },


    // "backlight/slider": {
    //     "min": 20,
    //     "max": 100,
    //     "orientation": "vertical",
    // },


    "backlight": {
        "format": "{icon} {percent}%",
        "format-icons": ["≤░Δη", "≤░Δθ", "≤░Δι"],
        //Reverse scrolling for touchpad
        "reverse-scrolling": true,
    },


    "wireplumber": {
        "format": "{icon}",
        "tooltip-format": "{node_name}:{volume}%",
        "format-muted": "ΎΑο",
        "on-click": "crosspipe",
        "format-icons": ["ΎΑο", "ΎΑπ", "ΎΑρ"],
        //Reverse scrolling for touchpad
        "reverse-scrolling": 1,
    },

    "tray": {
        "icon-size": 21,
        "spacing": 5
    },

    "clock": {
        "interval": 60,
        "format": "{:%e %b %Y %H:%M}",
        "tooltip": true,
        "tooltip-format": "<big>{:%B %Y}</big>\n<tt>{calendar}</tt>",
        // "on-click": "swaymsg exec \\$calendar"
    },
}
