set $sink_volume wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep '^Volume:' | cut -d : -f 2 | tr -d ' '

# These variants use wob to show an onscreen bar too...
# ... but get basic bindings working first
# set $volume_down $onscreen_bar $(wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && $sink_volume)
# set $volume_up $onscreen_bar $(wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && $sink_volume)
# set $volume_mute $onscreen_bar $(pactl set-sink-mute @DEFAULT_SINK@ toggle && pactl get-sink-mute @DEFAULT_SINK@ | sed -En "/no/ s/.*/$($sink_volume)/p; /yes/ s/.*/0/p")

set $volume_down wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
set $volume_up wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# --locked flags allow the buttons to be used whilst the screen is locked.
bindsym --locked XF86AudioRaiseVolume exec $volume_up
bindsym --locked XF86AudioLowerVolume exec $volume_down
bindsym --locked XF86AudioMute exec $volume_mute
bindsym XF86AudioMicMute exec $mic_mute


set $ource_volume wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep '^Volume:' | cut -d : -f 2 | tr -d ' '
# set $mic_mute $onscreen_bar $(pactl set-source-mute @DEFAULT_SOURCE@ toggle && pactl get-source-mute @DEFAULT_SOURCE@ | sed -En "/no/ s/.*/$($source_volume)/p; /yes/ s/.*/0/p")
